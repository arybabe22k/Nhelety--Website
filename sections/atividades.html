<!-- ════════════════════════════════════════
     sections/atividades.html
     Secção pública de posts + painel admin
     Associação Nhelety
     ════════════════════════════════════════ -->

<!-- SECÇÃO PÚBLICA -->
<section id="atividades" class="py-24" style="background:linear-gradient(180deg,#FFFDF5 0%,#FFF8E1 100%)">
  <div class="max-w-6xl mx-auto px-5">

    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-6 mb-10 reveal">
      <div>
        <div class="section-label">O que fazemos</div>
        <div class="accent-line"></div>
        <h2 class="text-4xl md:text-5xl font-black">Atividades & Notícias</h2>
        <p class="text-gray-500 mt-3 max-w-lg">
          Acompanhe os projectos, eventos e iniciativas da Associação Nhelety em Moçambique.
        </p>
      </div>
      <button onclick="openAdmin()" class="btn-ajudar self-start md:self-auto flex-shrink-0" style="background:var(--escuro)">
        ⚙️ Gerir Posts
      </button>
    </div>

    <!-- Filtros -->
    <div id="filtros-categoria" class="flex flex-wrap gap-2 mb-8 reveal"></div>

    <!-- Grid de posts (renderizado por atividades.js) -->
    <div id="posts-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 reveal"></div>

  </div>
</section>


<!-- ════════════════════════════════════════
     PAINEL DE ADMINISTRAÇÃO (modal)
     Controlado por atividades.js
     ════════════════════════════════════════ -->
<div id="admin-panel" role="dialog" aria-modal="true" aria-label="Painel de administração de posts">
  <div class="admin-modal">

    <!-- Cabeçalho -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100 sticky top-0 bg-white rounded-t-2xl z-10">
      <div>
        <h2 class="text-xl font-black" style="font-family:'Playfair Display',serif">Gerir Atividades</h2>
        <p class="text-xs text-gray-400 mt-0.5">Crie, edite ou elimine posts de atividades</p>
      </div>
      <button onclick="closeAdmin()"
        class="w-9 h-9 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-100 hover:text-gray-700 transition-colors text-xl font-bold"
        aria-label="Fechar">✕</button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 px-6 pt-4 pb-2">
      <button class="admin-tab active" data-aba="lista">📋 Lista de Posts</button>
      <button class="admin-tab"        data-aba="novo" >➕ Novo Post</button>
    </div>

    <!-- ABA: Lista -->
    <div id="admin-lista" class="px-6 pb-6">
      <div id="admin-lista-posts">
        <!-- Preenchido por atividades.js -->
      </div>
    </div>

    <!-- ABA: Novo / Editar -->
    <div id="admin-form-wrap" class="px-6 pb-6" style="display:none">
      <h3 id="admin-form-titulo" class="font-bold text-lg mb-5">Novo Post</h3>

      <form id="admin-form" class="space-y-4" onsubmit="return false;">

        <div>
          <label class="form-label" for="f-titulo">Título *</label>
          <input id="f-titulo" type="text" class="form-input" placeholder="Título do post" required />
        </div>

        <div>
          <label class="form-label" for="f-resumo">Resumo / Descrição *</label>
          <textarea id="f-resumo" rows="4" class="form-input resize-none"
            placeholder="Descreva brevemente esta atividade..." required></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="form-label" for="f-categoria">Categoria *</label>
            <select id="f-categoria" class="form-input" required>
              <option value="evento">📅 Evento</option>
              <option value="projeto">🌱 Projecto</option>
              <option value="noticia" selected>📰 Notícia</option>
              <option value="parceria">🤝 Parceria</option>
            </select>
          </div>
          <div>
            <label class="form-label" for="f-data">Data *</label>
            <input id="f-data" type="date" class="form-input" required />
          </div>
        </div>

        <div>
          <label class="form-label" for="f-autor">Autor / Origem</label>
          <input id="f-autor" type="text" class="form-input" placeholder="Ex: Conselho de Direção" />
        </div>

        <div class="flex items-center gap-3 p-3 rounded-xl" style="background:#FEF3C7">
          <input id="f-destaque" type="checkbox" class="w-4 h-4 accent-orange-500" />
          <label for="f-destaque" class="text-sm font-semibold cursor-pointer">
            📌 Marcar como post em destaque (aparece no topo)
          </label>
        </div>

        <p id="admin-form-error" class="text-red-500 text-sm font-medium"></p>

        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn-ajudar flex-1 text-center" style="border:none;cursor:pointer">
            Guardar Post ✓
          </button>
          <button type="button" onclick="closeAdmin()"
            class="btn-secundario px-6" style="cursor:pointer">
            Cancelar
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
